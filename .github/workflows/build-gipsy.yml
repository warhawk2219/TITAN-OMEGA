name: Build GIPSY APK

on:
  push:
    branches: [ main ]
    paths:
      - 'GIPSY/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x GIPSY/gradlew

      - name: Build Debug APK
        run: |
          cd GIPSY
          ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GIPSY-debug-APK
          path: GIPSY/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gipsy-build-${{ github.run_number }}
          name: GIPSY Build ${{ github.run_number }}
          body: |
            ## GIPSY APK — Build ${{ github.run_number }}
            
            ### Setup:
            1. Install IRONGATE first
            2. Install GHOST second  
            3. Install GIPSY third
            4. Add your Gemini or Groq API key in GIPSY settings
            
          files: GIPSY/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
