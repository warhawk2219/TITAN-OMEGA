name: Build IRONGATE APK

on:
  push:
    branches: [ main ]
    paths:
      - 'IRONGATE/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x IRONGATE/gradlew

      - name: Build Debug APK
        run: |
          cd IRONGATE
          ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IRONGATE-debug-APK
          path: IRONGATE/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: irongate-build-${{ github.run_number }}
          name: IRONGATE Build ${{ github.run_number }}
          body: |
            ## IRONGATE APK — Build ${{ github.run_number }}
            
            ### Install order:
            1. Install IRONGATE first
            2. Then install GHOST
            3. Then install GIPSY
            4. Say "GHOST, Commence IRONGATE Protocol" to verify connection
            
            Notification should show:
            "Bridge: Active — GHOST connected — GIPSY connected"
            
          files: IRONGATE/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
