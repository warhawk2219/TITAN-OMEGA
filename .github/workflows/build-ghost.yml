name: Build GHOST APK
 
on:
  push:
    branches: [ main ]
    paths:
      - 'GHOST/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
 
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
 
      - name: Grant execute permission for gradlew
        run: chmod +x GHOST/gradlew
        
      - name: Create font directory and placeholder fonts
        run: |
          mkdir -p GHOST/app/src/main/res/font
          # Download Minecraft font
          curl -L "https://github.com/IdreesInc/Monocraft/releases/download/v3.0/Monocraft.ttf" -o GHOST/app/src/main/res/font/minecraft_regular.ttf || \
          cp GHOST/app/src/main/res/font/minecraft_regular.ttf GHOST/app/src/main/res/font/minecraft_regular.ttf 2>/dev/null || \
          touch GHOST/app/src/main/res/font/minecraft_regular.ttf
          cp GHOST/app/src/main/res/font/minecraft_regular.ttf GHOST/app/src/main/res/font/minecraft_bold.ttf
 
      - name: Create placeholder model files for build
        run: |
          mkdir -p GHOST/app/src/main/assets
          # Create tiny placeholder files so the build doesn't fail
          # Real model files must be added manually to the device
          echo "PLACEHOLDER - Replace with real vosk-model-small-en folder" > GHOST/app/src/main/assets/vosk-model-placeholder.txt
          echo "PLACEHOLDER - Replace with real gemma-3-1b-it-cpu-int4.bin" > GHOST/app/src/main/assets/gemma-placeholder.txt
 
      - name: Build Debug APK
        run: |
          cd GHOST
          ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
 
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GHOST-debug-APK
          path: GHOST/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
 
      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ghost-build-${{ github.run_number }}
          name: GHOST Build ${{ github.run_number }}
          body: |
            ## GHOST APK — Build ${{ github.run_number }}
            
            ### Download and install:
            1. Download GHOST-debug.apk below
            2. Transfer to your Redmi Note 8 Pro
            3. Enable "Install unknown apps" in Settings
            4. Tap the APK to install
            
            ### IMPORTANT — Model files required:
            This APK does NOT include the AI model files.
            You must manually copy these to your phone after installing:
            
            **Vosk model** (speech recognition):
            Download: https://alphacephei.com/vosk/models
            File: vosk-model-small-en-us-0.15
            Place at: Android/data/com.ghost/files/vosk-model-small-en/
            
            **Gemma 3 1B model** (AI brain):
            Download from Kaggle or HuggingFace
            File: gemma-3-1b-it-cpu-int4.bin
            Place at: Android/data/com.ghost/files/
            
          files: GHOST/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
