name: Build GHOST APK
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
 
      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
 
      - name: Setup Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip
          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
 
      - name: Accept Android licenses and install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
 
      - name: Install Gradle wrapper
        run: |
          cd GHOST
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.4/bin/gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew
 
      - name: Create font placeholders
        run: |
          mkdir -p GHOST/app/src/main/res/font
          # Try to download Monocraft font (Minecraft-style, open source)
          wget -q "https://github.com/IdreesInc/Monocraft/releases/download/v3.0/Monocraft.ttf" \
            -O GHOST/app/src/main/res/font/minecraft_regular.ttf 2>/dev/null || \
            printf '\x00\x01\x00\x00' > GHOST/app/src/main/res/font/minecraft_regular.ttf
          cp GHOST/app/src/main/res/font/minecraft_regular.ttf \
             GHOST/app/src/main/res/font/minecraft_bold.ttf
 
      - name: Create asset placeholders
        run: |
          mkdir -p GHOST/app/src/main/assets
          echo "Placeholder - add real vosk model" > GHOST/app/src/main/assets/vosk-placeholder.txt
          echo "Placeholder - add real gemma model" > GHOST/app/src/main/assets/gemma-placeholder.txt
 
      - name: Build Debug APK
        run: |
          cd GHOST
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
 
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: GHOST-APK
          path: GHOST/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
 
      - name: Create Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ghost-v${{ github.run_number }}
          name: "GHOST v${{ github.run_number }}"
          body: |
            ## GHOST APK — Ready to install
 
            1. Download **app-debug.apk** below
            2. Transfer to your Redmi Note 8 Pro
            3. Settings → Privacy → Install unknown apps → Allow
            4. Tap APK to install
            5. Grant all permissions on first launch
 
            ### Model files required after install:
            Copy these to `Android/data/com.ghost/files/` on your phone:
 
            **Vosk STT model:**
            https://alphacephei.com/vosk/models
            Download: vosk-model-small-en-us-0.15 → rename to vosk-model-small-en
 
            **Gemma 3 1B model:**
            https://huggingface.co/google/gemma-3-1b-it
            Download: gemma-3-1b-it-cpu-int4.bin
          files: GHOST/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
